{{ $paginator := . }}
{{ range $paginator.Pagers }}
  {{ if partial "commons/section/helpers/ShouldShowPageNumber" (dict
      "paginator" $paginator
      "context" .
    ) }}
    {{ $label := i18n "commons.pagination.page" (dict "Number" .PageNumber) }}
    <li{{ if eq . $paginator }} class="active"{{ end }}>
      <a href="{{ .URL }}" aria-label="{{ $label }}">
        {{ .PageNumber }}
      </a>
    </li>
  {{ end }}
{{ end }}
