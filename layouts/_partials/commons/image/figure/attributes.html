{{- with .image_class }}
  class="{{ . }}"
{{- end -}}
{{ if or .text .credit -}}
  role="figure" aria-label="{{ .text | plainify | chomp }}
  {{- with .credit }}
    {{ i18n "commons.accessibility.credits" }}
    {{ replaceRE "<span class=\"sr-only\">(.*?)</span>" "" . | plainify | chomp }}
  {{ end -}}"
{{ end -}}
