{{ if or .image.text .image.credit }}
  <figcaption {{ if .focusable_figcaption }} tabindex="0" {{ end }}>
    {{ with .image.text }}
      <div>{{ . | safeHTML }}</div>
    {{ end }}
    {{ with .image.credit }}
      {{ partial "commons/image/credit.html" . }}
    {{ end }}
  </figcaption>
{{ end }}
