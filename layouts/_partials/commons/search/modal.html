{{ if site.Params.search.active }}
  <pagefind-modal>
    <div class="container">
      <pagefind-modal-header>
        <pagefind-input></pagefind-input>
      </pagefind-modal-header>
      <pagefind-modal-body>
        <div class="pf-modal-content">
          <div class="pf-modal-aside">
            <pagefind-summary></pagefind-summary>
            <pagefind-filter-pane expanded></pagefind-filter-pane>
            <pagefind-keyboard-hints></pagefind-keyboard-hints>
          </div>
          <pagefind-results show-images class="pf-modal-results" max-results="10"></pagefind-results>
        </div>
      </pagefind-modal-body>
      {{ partial "commons/search/hooks/before-modal-end.html" . }}
    </div>
  </pagefind-modal>
  <script src="/pagefind/pagefind-component-ui.js" defer async></script>
{{ end }}
