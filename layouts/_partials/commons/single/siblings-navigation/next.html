{{ $label := .label }}
{{ with .page }}
  <li class="next">
    {{ $title := safeHTML .Title -}}
    <a href="{{ .RelPermalink }}"
      title="{{ safeHTML (i18n "posts.next_aria" (dict "Title" $title)) }}">
      <span>
        {{- $label -}}
      </span>
      {{- $title -}}
    </a>
  </li>
{{ end }}
