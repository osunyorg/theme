{{ $taxonomies := partial "helpers/param/GetSiteParamWithDefault" (dict
  "param" (printf "%s.single.meta.options.taxonomies" .Type)
  "default" "default.single.meta.options.taxonomies"
) }}

{{ if and $taxonomies .Params.taxonomies }}
  <li class="taxonomies">
    {{ partial "taxonomies/single/list.html" . }}
  </li>
{{ end }}
