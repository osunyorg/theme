{{ $persons := .Pages | uniq }}
{{ $paginator := .Paginate $persons.ByTitle  3}}
{{ if not $paginator.Pages }}
  {{ $is_term := eq .Kind "term" }}
  <p>{{ i18n (cond $is_term "categories.no_person" "persons.none") }}</p>
{{ else }}
  {{ partial "persons/partials/list.html" $paginator.Pages }}
{{ end }}
