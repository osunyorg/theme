{{ $persons := . }}
{{ $options := site.Params.persons.index.options }}
{{ $layout := site.Params.persons.index.layout }}

<ol class="persons persons--{{ $layout }} {{- if $options.contact }} with-contacts {{- end }}">
  {{- range $persons -}}
    {{ partial "persons/partials/person.html" (dict
      "person" .
      "options" $options
      "layout" $layout
    ) }}
  {{- end -}}
</ol>
