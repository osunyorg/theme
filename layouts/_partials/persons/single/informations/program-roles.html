{{ $slug := .slug }}
<div class="roles">
  {{ range .programs }}
    {{ $program := . }}
    {{ range .Params.roles }}
      {{ $role := .title }}
      {{ if in .persons $slug }}
        <p>
          <span>{{ safeHTML $role }}</span>
          <a href="{{ $program.Permalink }}" class="link">{{ safeHTML $program.Title }}</a>
        </p>
      {{ end }}
    {{ end }}
  {{ end }}
</div>
