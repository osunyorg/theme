{{ if .Params.Researchers }}
  <section class="paper-authors" id="authors">
    <h2>{{ i18n "volumes.authors" }}</h2>
    <ul class="authors">
      {{ range .Params.Researchers }}
        {{ with site.GetPage (printf "/persons/%s" .) }}
          {{ partial "persons/partials/person.html" (dict "person" .) }}
        {{ end }}
      {{ end }}
    </ul>
  </section>
{{ end }}
