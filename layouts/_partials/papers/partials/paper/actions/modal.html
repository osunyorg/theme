
<div class="modal paper-modal"
    id="{{ .id }}"
    aria-labelledby="{{ .id }}-label"
    aria-hidden="true"
    aria-modal="true"
    role="dialog">
  <div class="modal-content">
    <div class="modal-header">
      <h3 class="modal-title" id="{{ .id }}-label">{{ .paper.Title }}</h3>
      <button class="close popup-close" type="button" aria-label="{{ i18n "commons.close" }}"></button>
    </div>
    <div class="modal-body">
      <div itemprop="abstract">
        {{ safeHTML .paper.Params.abstract }}
      </div>
    </div>
  </div>
</div>
