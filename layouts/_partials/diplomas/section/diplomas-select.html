{{ $diplomas := where site.RegularPages "Section" "diplomas" }}

{{ if $diplomas }}
  <div class="diplomas-select">
    <button type="button" id="diplomasButton" aria-expanded="false" aria-controls="diplomas-select">
      {{- i18n "diplomas.type" -}}
    </button>
    <ul class="dropdown-menu extendable" aria-labelledby="diplomasButton" id="diplomas-select">
      {{ range $diplomas }}
        <li>
          <a href="{{ .Permalink }}">
            {{- safeHTML .Title -}}
            {{ if .Params.short_name }}
              ({{ safeHTML .Params.short_name }})
            {{ end }}
          </a>
        </li>
      {{ end }}
    </ul>
  </div>
{{ end }}
