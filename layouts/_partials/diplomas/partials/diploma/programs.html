<ol class="programs">
  {{ range . }}
    <li>
      <a href="{{ .permalink }}" title="{{ safeHTML (i18n "commons.more_aria" (dict "Title" .label)) }}">
        {{- safeHTML .label -}}
      </a>
      {{ with .children }}
        {{ partial "diplomas/partials/diploma/programs.html" . }}
      {{ end }}
    </li>
  {{ end }}
</ol>
