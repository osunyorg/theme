{{ with .data.image }}
  {{ with .id }}
    {{ partial "pagedjs/partials/image.html" . }}
  {{ end }}
  <figcaption>
    {{ with .text }}
      {{ . | safeHTML }}
    {{ end }}
    {{ with .credit }}
      {{ partial "commons/image/figure/figcaption/credit.html" . }}
    {{ end }}
  </figcaption>
{{ end }}
