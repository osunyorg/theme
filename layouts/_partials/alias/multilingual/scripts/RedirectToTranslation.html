<script>
  ;(function () {
    if (window.location.pathname !== '/') {
      return;
    }

    var preferLang = getFirstBrowserLanguage(),
        url = '{{ .Permalink }}'; // default url

    {{ with site.Home.AllTranslations }}
      {{ range . }}
        if (preferLang.indexOf('{{ .Language.Locale }}') > -1) {
          url = '/{{ .Language.Locale }}/';
        }
      {{ end }}
    {{ end }}

    window.location.replace(url);
  })();
</script>
