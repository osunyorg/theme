{{ $permalink := .permalink }}
{{ $label_type := .label_type | default "short" }}

<table class="calendar-month">
  <caption>
    <h2>
      {{ if $permalink }}
        <a href="{{ $permalink }}" title="{{ i18n "events.calendar.month.link" (dict "month" .name) }}">
          {{ .name }}
        </a>
      {{ else }}
        {{ .name }}
      {{ end }}
    </h2>
  </caption>
  {{ partial "events/section/calendar/month/thead.html" $label_type }}
  {{ partial "events/section/calendar/month/tbody.html" . }}
</table>
