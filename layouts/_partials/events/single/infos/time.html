{{ with .Params.current_time_slot }}
  {{ if .start.time }}
    <li>
      <span>{{ i18n "commons.hour" }}</span>
      {{ with .start.time }}
        <time datetime="{{ . }}">{{ . }}</time>
      {{ end }}
      {{ with .end.time }}
        <time datetime="{{ . }}">{{ . }}</time>
      {{ end }}
    </li>
  {{ end }}
{{ end }}
