{{ if .link.image }}
  {{ $sizes := (index site.Params.image_sizes.blocks.links .layout) }}
  {{ if .options.icons }}
    {{ $sizes = site.Params.image_sizes.blocks.links.icons }}
  {{ end }}
  <div class="media {{ if .options.icons -}} media--icon {{- end }}">
    {{ partial "commons/image.html" (dict
      "image" .link.image
      "alt" .link.alt
      "sizes" $sizes
    ) }}
  </div>
{{ end }}
