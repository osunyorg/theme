{{ $transcription := printf "<p>%s</p>" .video.title }}
{{ if .transcription }}
  {{ $transcription = printf "%s%s" $transcription .transcription }}
{{ end}}

{{ $options := (dict
  "mode" "player"
  "videoId" .html_id
  "transcription" $transcription
) }}
<button class="btn"
  id="play-{{ .html_id }}"
  data-lightbox="{{ $options | encoding.Jsonify }}">
    <span>{{ i18n "blocks.video.play" }}</span>
</button>
