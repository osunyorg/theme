<figure {{ with or .alt .credit }} role="figure" aria-label="{{ . | plainify }}" {{ end }}>
  {{ partial "commons/image.html" (dict
    "image" .image
    "alt" .alt
    "sizes" site.Params.image_sizes.blocks.features
  ) }}
  
  {{ with .credit }}
    <figcaption class="credit">
      {{ safeHTML . }}
    </figcaption>
  {{ end }}
</figure>
