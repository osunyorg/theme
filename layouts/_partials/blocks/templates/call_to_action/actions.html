{{ if .buttons }}
  <div class="actions" {{ if gt (len .buttons) 1 }}role="group"{{ end -}}>
    {{ range .buttons }}
      {{ if .title }}
        {{ $title := safeHTML .title }}
        <a href="{{ .url }}"
          {{ if .target_blank }}
            title="{{ i18n "commons.link.blank_aria" (dict "Title" $title) }}"
            target="_blank"
            rel="noreferrer noopener"
          {{ else }}
            title="{{ $title }}"
          {{ end }}>
          {{- $title -}}
        </a>
      {{ end }}
    {{ end }}
  </div>
{{ end }}
