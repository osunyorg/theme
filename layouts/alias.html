<!DOCTYPE html>
<html lang="{{ site.Language.Locale }}">
  <head>
    <title>{{ .Permalink }}</title>
    <link rel="canonical" href="{{ .Permalink }}"/>
    <meta name="robots" content="noindex">
    <meta charset="utf-8"/>
    {{ if hugo.IsMultilingual }}
      {{ partial "alias/multilingual/head.html" . }}
    {{ else }}
      {{ partial "alias/monolingual/head.html" . }}
    {{ end }}
  </head>
  {{ if hugo.IsMultilingual }}
    {{ partial "alias/multilingual/body.html" . }}
  {{ end }}
</html>
